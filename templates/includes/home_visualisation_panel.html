<div class="hv-wrap">
    <div class="hv-container">
        <div class="hv-left">
            <h3>Hero Type</h3>
            <button type="button" onclick="hvFilterHero('All')">All</button>
            <button type="button" onclick="hvFilterHero('Strength')">Strength</button>
            <button type="button" onclick="hvFilterHero('Agility')">Agility</button>
            <button type="button" onclick="hvFilterHero('Intelligence')">Intelligence</button>
            <button type="button" onclick="hvFilterHero('Universal')">Universal</button>

            <h3>Search</h3>
            <input class="hv-search" id="hvSearchHero" onkeyup="hvSearchHero()" placeholder="search hero or cosmetic">
            <div id="hvSearchResults" class="hv-search-results"></div>

            <h3>Heroes</h3>
            <div id="hvHeroGrid" class="hv-hero-grid">
                {% for hero in heroes %}
                    <img src="{{ hero.icon }}"
                         onerror="this.onerror=null;this.src='{{ hero.fallback_icon|escapejs }}';"
                         data-hero-id="{{ hero.id }}"
                         data-type="{{ hero.type }}"
                         data-name="{{ hero.name }}"
                         title="{{ hero.name }}"
                         alt="{{ hero.name }}"
                         onclick="hvSelectHero({{ hero.id }}, '{{ hero.name|escapejs }}')">
                {% endfor %}
            </div>

            <div class="hv-selected-box">
                <h3>Selected</h3>
                <ul id="hvSelectedList"></ul>
            </div>
        </div>

        <div class="hv-right">
            <h3>Line Chart</h3>
            <canvas id="hvChart" width="700" height="350"></canvas>

            <h3>Time Range</h3>
            <button type="button" onclick="hvSetTime('7')">7 days</button>
            <button type="button" onclick="hvSetTime('30')">30 days</button>
            <button type="button" onclick="hvSetTime('365')">1 year</button>

            <h3>Chart Type</h3>
            <button type="button" onclick="hvLoadChart('time-price')">time-price</button>
            <button type="button" onclick="hvLoadChart('time-quantity')">time-quantity</button>
            <button type="button" onclick="hvLoadChart('quantity-price')">quantity-price</button>
        </div>
    </div>

    <div id="hvPopup"></div>
</div>
{{ search_items|json_script:"home-visualization-search-items" }}

<script>
let hvChart = null;
let hvCurrentItemId = null;
let hvCurrentTimeRange = "365d";
let hvCurrentChartType = "time-price";
let hvCurrentItemLabel = "";
let hvSelectedItems = [];
let hvCurrentHeroType = "All";
const hvSearchItems = JSON.parse(document.getElementById("home-visualization-search-items").textContent);

function hvNormalizeText(value) {
    return String(value || "").toLowerCase();
}

function hvGetCosmeticsForHero(heroId) {
    return hvSearchItems.filter(item => item.hero_id === heroId);
}

function hvHeroMatchesQuery(heroId, heroName, query) {
    if (!query) {
        return true;
    }

    if (hvNormalizeText(heroName).includes(query)) {
        return true;
    }

    return hvSearchItems.some(item =>
        item.hero_id === heroId &&
        (hvNormalizeText(item.name).includes(query) || hvNormalizeText(item.hero_name).includes(query))
    );
}

function hvRenderSearchResults(query) {
    const container = document.getElementById("hvSearchResults");
    container.innerHTML = "";

    if (!query) {
        return;
    }

    const matches = hvSearchItems
        .filter(item =>
            hvNormalizeText(item.hero_name).includes(query) ||
            hvNormalizeText(item.name).includes(query)
        )
        .slice(0, 12);

    if (matches.length === 0) {
        container.innerHTML = '<div class="hv-search-result">No matching cosmetics.</div>';
        return;
    }

    matches.forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "hv-search-result";
        button.innerHTML = `${item.name}<small>${item.hero_name} | ${item.hero_type}</small>`;
        button.addEventListener("click", () => {
            hvSelectCosmetic(item.id, item.hero_name, item.name);
            document.getElementById("hvSearchHero").value = item.name;
            hvRenderSearchResults("");
            hvApplyHeroFilters();
        });
        container.appendChild(button);
    });
}

function hvApplyHeroFilters() {
    const input = hvNormalizeText(document.getElementById("hvSearchHero").value);
    const heroGrid = document.getElementById("hvHeroGrid");
    const images = heroGrid.getElementsByTagName("img");

    for (let i = 0; i < images.length; i++) {
        const heroId = parseInt(images[i].getAttribute("data-hero-id"), 10);
        const heroName = images[i].getAttribute("data-name");
        const heroType = images[i].getAttribute("data-type");
        const matchesSearch = hvHeroMatchesQuery(heroId, heroName, input);
        const matchesType = hvCurrentHeroType === "All" || heroType === hvCurrentHeroType;
        images[i].style.display = matchesSearch && matchesType ? "" : "none";
    }
}

function hvSearchHero() {
    hvApplyHeroFilters();
    hvRenderSearchResults(hvNormalizeText(document.getElementById("hvSearchHero").value));
}

function hvFilterHero(type) {
    hvCurrentHeroType = type;
    hvApplyHeroFilters();
}

function hvSelectHero(heroId, heroName) {
    const cosmetics = hvGetCosmeticsForHero(heroId);

    if (cosmetics.length === 0) {
        alert("This hero has no cosmetic data yet.");
        return;
    }

    let html = `<div style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border:2px solid #333; z-index:1000;">
                <h3>Select a cosmetic for ${heroName}</h3>
                <ul style="list-style:none; padding:0;">`;

    cosmetics.forEach(cosmetic => {
        html += `<li style="padding:5px; cursor:pointer;" onclick="hvSelectCosmetic(${cosmetic.id}, '${heroName}', '${String(cosmetic.name).replace(/'/g, "\\'")}')">${cosmetic.name}</li>`;
    });

    html += `</ul><button onclick="hvClosePopup()">Close</button></div>
            <div onclick="hvClosePopup()" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;"></div>`;

    document.getElementById("hvPopup").innerHTML = html;
}

function hvSelectCosmetic(cosmeticId, heroName, cosmeticName) {
    hvCurrentItemId = cosmeticId;
    hvCurrentItemLabel = `${heroName} - ${cosmeticName}`;
    const item = { id: cosmeticId, hero: heroName, name: cosmeticName };
    const exists = hvSelectedItems.find(selected => selected.id === cosmeticId);

    if (!exists) {
        hvSelectedItems.push(item);
        hvUpdateSelectedList();
    }

    hvClosePopup();
    hvLoadChart(hvCurrentChartType);
}

function hvUpdateSelectedList() {
    const list = document.getElementById("hvSelectedList");
    list.innerHTML = "";

    hvSelectedItems.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.hero} - ${item.name}`;
        list.appendChild(li);
    });
}

function hvClosePopup() {
    document.getElementById("hvPopup").innerHTML = "";
}

function hvSetTime(days) {
    if (days === "7") {
        hvCurrentTimeRange = "7d";
    } else if (days === "30") {
        hvCurrentTimeRange = "30d";
    } else {
        hvCurrentTimeRange = "365d";
    }

    if (hvCurrentItemId) {
        hvLoadChart(hvCurrentChartType);
    }
}

function hvLoadChart(chartType) {
    if (!hvCurrentItemId) {
        alert("Please select a hero cosmetic first.");
        return;
    }

    hvCurrentChartType = chartType;

    fetch(`/api/items/${hvCurrentItemId}/history/?range=${hvCurrentTimeRange}`)
        .then(response => response.json())
        .then(data => {
            if (!Array.isArray(data.labels) || data.labels.length === 0) {
                alert("No market data found for this cosmetic.");
                return;
            }

            const ctx = document.getElementById("hvChart").getContext("2d");

            if (hvChart) {
                hvChart.destroy();
            }

            const config = {
                type: "line",
                data: {},
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: true },
                        title: { display: true, text: `${hvCurrentItemLabel} | ${chartType.toUpperCase()}` }
                    }
                }
            };

            if (chartType === "time-price") {
                config.data = {
                    labels: data.labels,
                    datasets: [
                        { label: "Price", data: data.prices, borderColor: "rgb(75, 192, 192)", pointRadius: 2, tension: 0.1 },
                        { label: "Price Trend", data: data.trend_price, borderColor: "rgb(255, 99, 132)", borderDash: [5, 5], pointRadius: 0, tension: 0.1 }
                    ]
                };
            } else if (chartType === "time-quantity") {
                config.data = {
                    labels: data.labels,
                    datasets: [
                        { label: "Quantity", data: data.quantities, borderColor: "rgb(54, 162, 235)", pointRadius: 0, stepped: true, tension: 0 },
                        { label: "Quantity Trend", data: data.trend_qty, borderColor: "rgb(255, 159, 64)", borderDash: [5, 5], pointRadius: 0, tension: 0.1 }
                    ]
                };
            } else {
                config.type = "scatter";
                config.data = {
                    datasets: [{
                        label: "Quantity vs Price",
                        data: data.quantities.map((q, idx) => ({ x: q, y: data.prices[idx] })),
                        backgroundColor: "rgb(153, 102, 255)"
                    }]
                };
                config.options.scales = {
                    x: { title: { display: true, text: "Quantity" } },
                    y: { title: { display: true, text: "Price" } }
                };
            }

            hvChart = new Chart(ctx, config);
        })
        .catch(() => alert("Failed to load chart data."));
}

function hvInitDefaultChart() {
    if (hvSearchItems.length === 0) {
        return;
    }

    const firstItem = hvSearchItems[0];
    hvSelectCosmetic(firstItem.id, firstItem.hero_name, firstItem.name);
}

hvApplyHeroFilters();
hvInitDefaultChart();
</script>
