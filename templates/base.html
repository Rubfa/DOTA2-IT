<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DOTA2SS{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        .page-shell {
            width: 60%;
            margin: 40px auto;
            box-sizing: border-box;
        }

        .top-tabs {
            display: flex;
            margin-bottom: 20px;
        }

        .tab {
            display: inline-block;
            padding: 12px 24px;
            border: 2px solid #333;
            text-decoration: none;
            color: black;
            background: white;
            font-weight: bold;
            margin-right: -2px;
        }

        .tab.active {
            background: #eaeaea;
        }

        .content-area {
            min-height: 700px;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page-shell">
        <div class="top-tabs">
            <a href="{% url 'messageboard:messageboard_home' %}"
               class="tab {% if current_page == 'messageboard' %}active{% endif %}">
                Message board
            </a>

            <a href="{% url 'mocktrade:index' %}"
               class="tab {% if current_page == 'mocktrade' %}active{% endif %}">
                Mock Trading
            </a>
        </div>

        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
