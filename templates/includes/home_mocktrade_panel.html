<div id="home-mocktrade-panel">
<div class="page-title">Mock Trading</div>

<div class="main-container">
    <div class="panel">
        <div class="panel-title">Account Information</div>

        <div class="section-title">Username</div>
        <div class="balance-box">
            {{ request.user.username }}
        </div>

        <div class="section-title">Account Balance</div>
        <div class="balance-box">{{ balance }}</div>

        <div class="section-title">Account Assets</div>
        <div class="assets-grid">
            {% for asset in assets %}
                <button
                    type="button"
                    class="asset-slot {% if asset %}asset-slot-button{% else %}asset-slot-empty{% endif %}"
                    {% if asset %}
                        data-item-id="{{ asset.id }}"
                        data-item-name="{{ asset.item_name }}"
                    {% else %}
                        disabled
                    {% endif %}
                >
                    {% if asset %}
                        {{ asset.item_name }}
                    {% else %}
                        Empty
                    {% endif %}
                </button>
            {% endfor %}
        </div>
    </div>

    {% include "includes/mocktrade_chart_panel.html" %}

    <div class="panel">
        <div class="panel-title">Trading Zone</div>

        <form class="trade-form" method="post" action="{% url 'home_test' %}?panel=mocktrade">
            {% csrf_token %}

            <div class="form-row">
                <label for="item_name">Search cosmetic name</label>
                <input type="text" id="item_name" name="item_name" placeholder="Enter cosmetic name" value="{{ item_name }}">
            </div>

            <div class="form-row">
                <label>Cosmetic Price</label>
                <div class="price-box">
                    {% if price %}
                        {{ price }}
                    {% else %}
                        -
                    {% endif %}
                </div>
            </div>

            <div class="button-row">
                <button class="trade-button" type="submit" name="action" value="search">SEARCH PRICE</button>
            </div>

            <div class="button-row">
                <button class="trade-button" type="submit" name="action" value="buy">BUY</button>
                <button class="trade-button" type="submit" name="action" value="sell">SELL</button>
            </div>
        </form>
    </div>
</div>
</div>

<script>
(function () {
    const storageKey = `mocktrade-scroll:${window.location.pathname}${window.location.search}`;
    const panel = document.getElementById("home-mocktrade-panel");
    const form = panel ? panel.querySelector(".trade-form") : null;
    const itemInput = form ? form.querySelector("#item_name") : null;
    const priceBox = form ? form.querySelector(".price-box") : null;
    const searchButton = form ? form.querySelector('button[name="action"][value="search"]') : null;

    const savedScroll = sessionStorage.getItem(storageKey);
    if (!savedScroll) {
        // Keep going: the async search handler below should still initialize.
    } else {
        sessionStorage.removeItem(storageKey);
        window.requestAnimationFrame(() => {
            window.scrollTo(0, parseInt(savedScroll, 10));
        });
    }

    if (!form || !searchButton || !itemInput || !priceBox) {
        return;
    }

    async function runAsyncSearch() {
        const formData = new FormData(form);
        formData.set("action", "search");
        searchButton.disabled = true;

        try {
            const response = await fetch(form.action, {
                method: "POST",
                headers: {
                    "X-Requested-With": "XMLHttpRequest",
                },
                body: formData,
            });
            if (!response.ok) {
                throw new Error(`Unexpected status: ${response.status}`);
            }

            const payload = await response.json();
            priceBox.textContent = payload.price || "-";
            if (payload.item_name) {
                itemInput.value = payload.item_name;
            }
        } catch (error) {
            console.error("Search price request failed.", error);
            priceBox.textContent = "Search failed";
        } finally {
            searchButton.disabled = false;
        }
    }

    form.addEventListener("submit", (event) => {
        const submitter = event.submitter;

        if (submitter && submitter.value === "search") {
            event.preventDefault();
            runAsyncSearch();
            return;
        }

        sessionStorage.setItem(storageKey, String(window.scrollY));
    });
})();
</script>
