{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DOTA2SS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --site-ink: #142033;
            --site-muted: #526277;
            --site-border: #d6e0ea;
            --site-card: rgba(255, 255, 255, 0.92);
            --site-accent: #0f766e;
            --site-accent-soft: #ebfffb;
            --site-shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--site-ink);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 34%),
                radial-gradient(circle at top right, rgba(37, 99, 235, 0.14), transparent 26%),
                linear-gradient(180deg, #f6fbff 0%, #eef4f9 100%);
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        main {
            width: min(1320px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 1.75rem 0 3rem;
            flex: 1;
        }

        header {
            border-bottom: 1px solid var(--site-border);
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
        }

        .header-container {
            width: min(1320px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.1rem;
            border-radius: 999px;
            text-decoration: none;
            color: var(--site-ink);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(37, 99, 235, 0.1));
            border: 1px solid rgba(15, 118, 110, 0.14);
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
        }

        .column1,
        .column2 {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.65rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--site-border);
            background: rgba(255, 255, 255, 0.92);
            color: var(--site-ink);
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .column1:hover,
        .column2:hover {
            transform: translateY(-1px);
            border-color: rgba(15, 118, 110, 0.3);
            box-shadow: 0 12px 22px rgba(15, 23, 42, 0.08);
        }

        .login,
        .logout {
            text-decoration: none;
            font-weight: 700;
        }

        footer {
            border-top: 1px solid var(--site-border);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
        }

        .footer-container {
            width: min(1320px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 1rem 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .footer-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.55rem 0.95rem;
            border-radius: 999px;
            border: 1px solid var(--site-border);
            background: var(--site-card);
            color: var(--site-muted);
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.04);
        }

        @media (max-width: 768px) {
            .header-container {
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
                justify-content: flex-end;
            }

            main {
                width: min(100%, calc(100% - 1rem));
                padding-top: 1rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <header>
        <div class="header-container">
            <div class="header-left">
                <a href="{% url 'home_test' %}" class="logo">Dota2SS</a>

                <a href="https://buff.163.com/market/dota2" 
                        class="column1" 
                        target="_blank"
                        rel="noopener noreferrer">
                        Buff Market
                </a>

                <a href="https://www.dotabuff.com/" 
                        class="column2" 
                        target="_blank"
                        rel="noopener noreferrer">
                        Match Info
                </a>
            </div>

            <div class="header-right">
                    {% if user.is_authenticated %}
                        <a href="{% url 'logout' %}?next={{ request.path }}" class="login btn btn-outline-dark btn-sm rounded-pill px-3">
                            Logout
                        </a>
                    {% else %}
                        <a href="{% url 'login' %}" class="logout btn btn-dark btn-sm rounded-pill px-3">Login</a>
                    {% endif %}
            </div>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <div class="footer-container">
            <span class="footer-item">Account Setting</span>
            <span class="footer-item">Using Instruction</span>
            <span class="footer-item">Contact Us</span>
        </div>
    </footer>
</body>
</html>
